<!DOCTYPE html>
<html>
    <head>
        <style>
            output{
                text-align: center;
                margin-top: 20px;
            }
            body{
                display:flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                 background-image: url(https://i.pinimg.com/1200x/9a/58/63/9a58633c39e7c0df9c4dcee2c7c15db9.jpg);
                background-repeat: repeat;
                background-size: cover;
            }
        </style>
    </head>
    <body>
        <table border="1" cellpadding="5" cellspacing="0" width="60%">
        <div id="output">
        <tr>
        <th><input type="number" id="n1" placeholder="Enter the number"></th>
        <br>
         <th><input type="number" id="n2" placeholder="Enter the number"></th>
        <br>
         <th><input type="number" id="n3" placeholder="Enter the number"></th>
        <br>
         <th><input type="number" id="n4" placeholder="Enter the number"></th>
        <br>
         <th><input type="number" id="n5" placeholder="Enter the number"></th>
        <br>
        <th><button onclick="largest()">Result</button></th>
        </tr>
        </div>
        </table>
        <script>
            function largest(){
                let a= parseInt(document.getElementById("n1").value);
                let b= parseInt(document.getElementById("n2").value);
                let c= parseInt(document.getElementById("n3").value);
                let d= parseInt(document.getElementById("n4").value);
                let e= parseInt(document.getElementById("n5").value);
                let largest;
                if(a>=b && a>=c && a>=d && a>=e){
                    largest=a;
                }
                else if(b>=a && b>=c && b>=d && b>=e){
                    largest=b;
                }
                else if(c>=a && c>=b && c>=d && c>=e){
                    largest=c;
                }
                else if(d>=a && d>=b && d>=c && d>=e){
                    largest=d;
                }
                else{
                    largest=e;
                }
                window.alert("The Largest of Five Numbers is : "+ largest);
            }
        </script>
    </body>
</html>
