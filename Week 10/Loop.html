<!DOCTYPE html>
<html>
    <head>
        <style>
            body{
                 background-image: url(https://i.pinimg.com/736x/71/f0/f8/71f0f8f4cf395aa401ba2ad93b744d46.jpg);
                background-repeat: repeat;
                background-size: cover;
                text-align: center;
                display:flex;
                align-items: center;
                height:100vh;
                margin:auto;
                justify-content: center;
                font-size: larger;
                color: purple;
            }
        </style>
    </head>
    <body>
        <script>
            for(let i=0;i<=15;i++){
                if(i%2==0){
                    document.write(""+ i +" is an Even Number. <br>");
                }
                else{
                    document.write(""+ i +" is a Odd Number. <br>");
                }
            }
        </script>
    </body>
</html>
