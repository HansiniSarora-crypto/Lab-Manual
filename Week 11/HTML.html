<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Registration</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background: #f4f4f9;
              background-image:url(https://i.pinimg.com/736x/76/30/b3/7630b3919b5c2aa80f828d2aa1d9bb06.jpg);
              background-repeat: no-repeat;
              background-size: cover; }
        .card { background:snow; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        .field { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background:mediumturquoise; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: powderblue; }
        .error { color: #d9534f; font-size: 0.8rem; margin-top: 5px; display: none; }
    </style>
</head>
<body>
<div class="card">
    <h2 style="color: purple;font-style: oblique;font-family: 'Times New Roman', Times, serif;text-align: center;font-size:x-large;">Sign Up</h2>
    <form id="registrationForm">
        <div class="field">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your name">
            <div id="nameError" class="error">Name is required.</div>
        </div>
        <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="email@example.com">
            <div id="emailError" class="error">Please enter a valid email.</div>
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Min. 6 characters">
            <div id="passError" class="error">Password must be at least 6 characters.</div>
        </div>
        <button type="submit">Register</button>
    </form>
</div>
<script>
    document.getElementById('registrationForm').addEventListener('submit', function(event) {
        event.preventDefault();
        document.querySelectorAll('.error').forEach(el => el.style.display = 'none');
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        let isValid = true;
        if (name === "") {
            document.getElementById('nameError').style.display = 'block';
            isValid = false;
        }
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailPattern.test(email)) {
            document.getElementById('emailError').style.display = 'block';
            isValid = false;
        }
        if (password.length < 6) {
            document.getElementById('passError').style.display = 'block';
            isValid = false;
        }
        if (isValid) {
            alert("Registration successful!");
        }
    });
</script>
</body>
</html>
