<!DOCTYPE html>
<html>
<head>
  <title>Password Strength Checker</title>
  <style>
    .weak { color: red; }
    .strong { color: green; }
    div{
          justify-content:center;
          text-align:center;
          font-size: larger;
          color:darkmagenta;
        }
       body{
          background-image:url(https://i.pinimg.com/736x/1c/76/2d/1c762d5079754f756d16745d950b78fa.jpg);
          background-repeat: no-repeat;
          background-position: center;
          background-size: cover;
          height:100%;
          margin:0;
          display:flex;
          align-items: center;
          height:100vh;
          margin:auto;
          justify-content: center;
       }
  </style>
</head>
<body>
   <div>
   <form>
      Password: <input type="password" id="password" placeholder="Enter password" onkeyup="checkStrength()">
      <p id="strengthMsg"></p>
    </form>
    </div>
    <script>
       function checkStrength() {
          let pwd = document.getElementById("password").value;
          let msg = document.getElementById("strengthMsg");
          if (pwd.length < 6) {
            msg.innerHTML = "Weak Password";
            msg.className = "weak";
         } else if (/[A-Z]/.test(pwd) && /[0-9]/.test(pwd) && /[^A-Za-z0-9]/.test(pwd)) {
            msg.innerHTML = "Strong Password";
            msg.className = "strong";
            msg.style.color = "green";
         } else {
            msg.innerHTML = "Medium Strength";
            msg.style.color = "orange";
         }
        }
    </script>
</body>
</html>
